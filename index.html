<script>

let originalQuestions=[];
let questions=[];
let currentQuestion=0;
let score=0;
let seconds=0;
let timer=null;
let userAnswers=[];
let studyMode=false;

const excelFile=document.getElementById('excelFile');
const btnImport=document.getElementById('btnImport');
const btnStart=document.getElementById('btnStart');
const btnReviewSaved=document.getElementById('btnReviewSaved');
const btnClearWrong=document.getElementById('btnClearWrong');
const btnClearHistory=document.getElementById('btnClearHistory');
const btnResetStudy=document.getElementById('btnResetStudy');
const btnNext=document.getElementById('btnNext');
const btnPrev=document.getElementById('btnPrev');
const btnLogin=document.getElementById('btnLogin');
const btnSaveBank=document.getElementById('btnSaveBank');
const passwordInput=document.getElementById('passwordInput');

btnImport.onclick=()=>excelFile.click();
excelFile.addEventListener('change',importExcel);
btnStart.addEventListener('click',startQuiz);
btnReviewSaved.addEventListener('click',reviewSavedWrong);
btnClearWrong.addEventListener('click',clearSavedWrong);
btnClearHistory.addEventListener('click',clearHistory);
btnResetStudy.addEventListener('click',resetStudyProgress);
btnNext.addEventListener('click',nextQuestion);
btnPrev.addEventListener('click',prevQuestion);
btnLogin.addEventListener('click',loginApp);
btnSaveBank.addEventListener('click',saveQuestionBank);

passwordInput.addEventListener('keypress',(e)=>{
  if(e.key==='Enter') loginApp();
});

const APP_PASSWORD='131124';

function loginApp(){

  const value=passwordInput.value.trim();

  const error=document.getElementById('loginError');

  if(value===APP_PASSWORD){

    document.getElementById('loginScreen').style.display='none';
    document.getElementById('mainApp').style.display='block';

    error.style.display='none';

    renderBanks();

  }else{

    error.style.display='block';
    passwordInput.focus();

  }
}

function processRawData(jsonData){

  let imported=[];

  const set=new Set();

  jsonData.forEach((row,index)=>{

    if(!row.Question) return;

    const map={A:0,B:1,C:2,D:3};

    const correctIndex=map[String(row.Answer).trim().toUpperCase()];

    const opts=[
      {text:row.A,correct:correctIndex===0},
      {text:row.B,correct:correctIndex===1},
      {text:row.C,correct:correctIndex===2},
      {text:row.D,correct:correctIndex===3}
    ].filter(o=>o.text!==undefined && o.text!=='');

    const key=String(row.Question).trim().toLowerCase();

    if(!set.has(key)){

      set.add(key);

      imported.push({
        id:index+1,
        question:row.Question,
        options:opts,
        law:row.Law || '',
        article:row.Article || '',
        note:row.Note || ''
      });
    }
  });

  return imported;
}

async function importExcel(e){

  const files=[...e.target.files];

  if(!files.length) return;

  let allJsonData=[];

  for(const file of files){

    const data=await file.arrayBuffer();

    const workbook=XLSX.read(data,{type:'array'});

    const sheet=workbook.Sheets[workbook.SheetNames[0]];

    const json=XLSX.utils.sheet_to_json(sheet);

    allJsonData=allJsonData.concat(json);
  }

  const imported=processRawData(allJsonData);

  if(imported.length>0){

    originalQuestions=imported;

    alert('Import thành công '+imported.length+' câu hỏi.');

    askToSaveOffline(imported);

  }else{

    alert('Không tìm thấy dữ liệu hợp lệ.');
  }

  excelFile.value='';
}

function askToSaveOffline(importedData){

  const autoSave=confirm(
    'Bạn có muốn lưu bộ đề offline không?'
  );

  if(autoSave){

    const name=prompt('Nhập tên bộ đề');

    if(name) saveBankData(name,importedData);
  }
}

function startQuiz(){

  if(!originalQuestions.length){
    alert('Hãy import dữ liệu hoặc nạp bộ đề!');
    return;
  }

  const mode=document.getElementById('quizMode').value;

  studyMode = mode === 'study';

  questions = originalQuestions.map(q=>(
    {
      ...q,
      options:[...q.options]
    }
  ));

  if(!studyMode){

    shuffle(questions);

    questions.forEach(q=>shuffle(q.options));

    if(mode!=='all'){

      questions = questions.slice(
        0,
        Math.min(parseInt(mode),questions.length)
      );
    }

    currentQuestion=0;
    score=0;
    userAnswers=[];

  }else{

    const savedProgress=JSON.parse(
      localStorage.getItem('study_progress') || '{}'
    );

    if(savedProgress.currentQuestion !== undefined){

      const resume=confirm(
        `📖 Tiếp tục từ câu ${savedProgress.currentQuestion + 1}?`
      );

      if(resume){

        currentQuestion=savedProgress.currentQuestion || 0;
        userAnswers=savedProgress.userAnswers || [];
        score=savedProgress.score || 0;

      }else{

        currentQuestion=0;
        userAnswers=[];
        score=0;
      }

    }else{

      currentQuestion=0;
      userAnswers=[];
      score=0;
    }
  }


  seconds=0;

  clearInterval(timer);

  timer=setInterval(()=>{

    seconds++;

    document.getElementById('timer').innerText=
      formatTime(seconds);

  },1000);

  document.getElementById('quizArea').classList.remove('hidden');

  document.getElementById('resultArea').classList.add('hidden');

  showQuestion();
}

function showQuestion(){

  const q=questions[currentQuestion];

  if(!q){
    finishQuiz();
    return;
  }

  const navMode=document.getElementById('navigationMode').value;

  document.getElementById('navButtons')
    .classList.toggle('hidden',navMode==='auto');

  document.getElementById('questionCounter').innerText=
    `Câu ${currentQuestion+1}/${questions.length}`;

  document.getElementById('scoreCounter').innerText=
    `Điểm: ${score}`;

  document.getElementById('questionText').innerText=q.question;

  const container=document.getElementById('optionsContainer');

  container.innerHTML='';

  q.options.forEach((opt,index)=>{

    const div=document.createElement('div');

    div.className='option';

    let text=opt.text;

    const saved=userAnswers[currentQuestion];

    if(saved){

      if(opt.correct){
        div.classList.add('correct');
        text+=' ✅';
      }

      if(saved.selected===index && !opt.correct){
        div.classList.add('wrong');
        text+=' ❌';
      }
    }

    div.innerText=text;

    if(!saved){
      div.onclick=()=>selectAnswer(index);
    }

    container.appendChild(div);
  });

  const legalBox=document.getElementById('legalBox');
  const legalContent=document.getElementById('legalContent');

  legalBox.classList.add('hidden');
  legalContent.innerHTML='';

  const saved=userAnswers[currentQuestion];

  if(saved){

    const html=`
      <div><b>📚 Luật:</b> ${q.law || 'Chưa cập nhật'}</div>
      <div><b>📘 Điều:</b> ${q.article || 'Chưa cập nhật'}</div>
      <div><b>📝 Ghi chú:</b><br>${q.note || 'Chưa có ghi chú'}</div>
    `;

    if(saved.correct){

      const btn=document.createElement('button');

      btn.innerText='👁 Xem căn cứ pháp lý';

      btn.style.marginTop='15px';

      btn.onclick=()=>{
        legalBox.classList.toggle('hidden');
        legalContent.innerHTML=html;
      };

      container.appendChild(btn);

    }else{

      legalBox.classList.remove('hidden');
      legalContent.innerHTML=html;
    }
  }
}

function selectAnswer(index){

  const q=questions[currentQuestion];

  const selected=q.options[index];

  userAnswers[currentQuestion]={
    selected:index,
    correct:selected.correct
  };

  if(selected.correct){
    score++;
  }else{

    let savedWrong=JSON.parse(
      localStorage.getItem('saved_wrong_questions') || '[]'
    );

    if(!savedWrong.some(w=>w.question===q.question)){
      savedWrong.push(q);
    }

    localStorage.setItem(
      'saved_wrong_questions',
      JSON.stringify(savedWrong)
    );
  }

  // LƯU TIẾN ĐỘ ĐÚNG VỊ TRÍ
  if(studyMode){

    localStorage.setItem(
      'study_progress',
      JSON.stringify({
        currentQuestion,
        userAnswers,
        score
      })
    );
  }

  showQuestion();

  const navMode=document.getElementById('navigationMode').value;

  if(navMode==='auto'){
    setTimeout(()=>nextQuestion(),1000);
  }
}

function nextQuestion(){

  if(currentQuestion < questions.length - 1){

    currentQuestion++;

    if(studyMode){

      localStorage.setItem(
        'study_progress',
        JSON.stringify({
          currentQuestion,
          userAnswers,
          score
        })
      );
    }

    showQuestion();

  }else{

    finishQuiz();

    if(studyMode){
      localStorage.removeItem('study_progress');
    }
  }
}

function prevQuestion(){

  if(currentQuestion>0){
    currentQuestion--;
    showQuestion();
  }
}

function finishQuiz(){

  clearInterval(timer);

  const percent=Math.round(
    (score/questions.length)*100
  );

  const history=JSON.parse(
    localStorage.getItem('quiz_history') || '[]'
  );

  history.unshift({
    date:new Date().toLocaleString(),
    score,
    total:questions.length,
    percent,
    time:formatTime(seconds)
  });

  localStorage.setItem(
    'quiz_history',
    JSON.stringify(history)
  );

  renderHistory();

  const result=document.getElementById('resultArea');

  result.classList.remove('hidden');

  result.innerHTML=`
    <h2>🎉 Hoàn thành bài thi</h2>
    <p><b>Điểm:</b> ${score}/${questions.length}</p>
    <p><b>Tỷ lệ đúng:</b> ${percent}%</p>
    <p><b>Thời gian:</b> ${formatTime(seconds)}</p>
<p><b>Số câu sai:</b> ${questions.length - score}</p>
  `;

  document.getElementById('quizArea').classList.add('hidden');
}


function reviewSavedWrong(){

  const saved=JSON.parse(
    localStorage.getItem('saved_wrong_questions') || '[]'
  );

  if(!saved.length){
    alert('Chưa có câu sai được lưu');
    return;
  }

  originalQuestions=[...saved];

  startQuiz();
}

function clearSavedWrong(){

  if(!confirm('Xóa toàn bộ sổ tay câu sai?')) return;

  localStorage.removeItem('saved_wrong_questions');

  alert('Đã xóa toàn bộ câu sai đã lưu');
}

function saveQuestionBank(){

  if(!originalQuestions.length){
    alert('Chưa có dữ liệu để lưu');
    return;
  }

  const name=document.getElementById('bankName').value.trim();

  if(!name){
    alert('Hãy nhập tên bộ đề');
    return;
  }

  saveBankData(name,originalQuestions);

  document.getElementById('bankName').value='';
}

function saveBankData(name,data){

  const banks=JSON.parse(
    localStorage.getItem('question_banks') || '[]'
  );

  const existingIndex=banks.findIndex(b=>b.name===name);

  const item={
    name,
    count:data.length,
    questions:data,
    updated:new Date().toLocaleString()
  };

  if(existingIndex>=0){
    banks[existingIndex]=item;
  }else{
    banks.push(item);
  }

  localStorage.setItem(
    'question_banks',
    JSON.stringify(banks)
  );

  renderBanks();

  alert('Đã lưu bộ đề: '+name);
}

function renderBanks(){

  const banks=JSON.parse(
    localStorage.getItem('question_banks') || '[]'
  );

  const div=document.getElementById('bankList');

  if(!banks.length){

    div.innerHTML='<div class="history-item">Chưa có bộ đề nào</div>';

    return;
  }

  div.innerHTML=banks.map((b,index)=>`

    <div class="history-item">

      <b>📘 ${b.name}</b> (${b.count} câu)<br>

      <small>🕒 ${b.updated}</small><br>

      <button
        onclick="loadBank(${index})"
        style="padding:4px 8px;font-size:12px;margin-top:5px;"
      >
        🚀 Nạp đề
      </button>

      <button
        onclick="deleteBank(${index})"
        style="padding:4px 8px;font-size:12px;margin-top:5px;background:#dc2626;"
      >
        🗑 Xóa
      </button>

    </div>

  `).join('');
}

function loadBank(index){

  const banks=JSON.parse(
    localStorage.getItem('question_banks') || '[]'
  );

  originalQuestions=banks[index].questions;

  alert('Đã mở bộ đề: '+banks[index].name);
}

function deleteBank(index){

  if(!confirm('Xóa bộ đề này?')) return;

  const banks=JSON.parse(
    localStorage.getItem('question_banks') || '[]'
  );

  banks.splice(index,1);

  localStorage.setItem(
    'question_banks',
    JSON.stringify(banks)
  );

  originalQuestions=[];

  renderBanks();
}

function clearHistory(){

  if(!confirm('Xóa lịch sử?')) return;

  localStorage.removeItem('quiz_history');

  renderHistory();
}

function renderHistory(){

  const history=JSON.parse(
    localStorage.getItem('quiz_history') || '[]'
  );

  const div=document.getElementById('history');

  if(!history.length){

    div.innerHTML='<div class="history-item">Chưa có lịch sử</div>';

    return;
  }

  div.innerHTML=history.map(h=>`

    <div class="history-item">
      📅 ${h.date} - 🎯 ${h.score}/${h.total} (${h.percent}%)
    </div>

  `).join('');
}

function resetStudyProgress(){

  if(!confirm('Reset toàn bộ tiến độ học?')) return;

  localStorage.removeItem('study_progress');

  alert('Đã reset tiến độ học');
}

function formatTime(sec){

  return `${String(Math.floor(sec/60)).padStart(2,'0')}:${String(sec%60).padStart(2,'0')}`;
}

function shuffle(arr){

  for(let i=arr.length-1;i>0;i--){

    const j=Math.floor(Math.random()*(i+1));

    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
}

/* --- ĐÃ THÊM: Tính năng cảm ứng vuốt màn hình (Swipe) trên iPhone --- */
let touchstartX = 0;
let touchendX = 0;
const quizArea = document.getElementById('quizArea');

quizArea.addEventListener('touchstart', e => {
    touchstartX = e.changedTouches[0].screenX;
}, { passive: true });

quizArea.addEventListener('touchend', e => {
    touchendX = e.changedTouches[0].screenX;
    handleGesture();
}, { passive: true });

function handleGesture() {
    if (touchstartX - touchendX > 80) { 
        nextQuestion(); // Vuốt màn hình từ phải sang trái -> Sang câu tiếp theo
    }
    if (touchendX - touchstartX > 80) {
        prevQuestion(); // Vuốt màn hình từ trái sang phải -> Lùi lại câu cũ
    }
}

renderHistory();

</script>
